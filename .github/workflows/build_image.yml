name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Release tag (e.g. 4.5.1_2026Feb)"
        required: true

  push:
    branches:
      - 'devel/**'
      - 'feature/**'
      - 'fix/**'
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:

# =========================
# amd64 build
# =========================

  build-amd64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="dev"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      # 1. Build r_base (base_stacks)
      - name: Build r_base (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: base_stacks
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/r_base:${{ steps.vars.outputs.TAG }}-amd64
          cache-from: type=gha,scope=rbase-amd64
          cache-to: type=gha,mode=max,scope=rbase-amd64
          provenance: false
          sbom: false

      # 2. Build rstudio
      - name: Build rstudio (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: rstudio
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/rstudio:${{ steps.vars.outputs.TAG }}-amd64
          cache-from: type=gha,scope=rstudio-amd64
          cache-to: type=gha,mode=max,scope=rstudio-amd64
          provenance: false
          sbom: false

      # 3. Build ssh
      - name: Build ssh (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ssh
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/r_remote:${{ steps.vars.outputs.TAG }}-amd64
          cache-from: type=gha,scope=ssh-amd64
          cache-to: type=gha,mode=max,scope=ssh-amd64
          provenance: false
          sbom: false

      # 4. Build codeserver
      - name: Build codeserver (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: codeserver
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/codeserver_r:${{ steps.vars.outputs.TAG }}-amd64
          cache-from: type=gha,scope=codeserver-amd64
          cache-to: type=gha,mode=max,scope=codeserver-amd64
          provenance: false
          sbom: false


# =========================
# arm64 build
# =========================

  build-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="dev"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      # 1. Build r_base (base_stacks)
      - name: Build r_base (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: base_stacks
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/r_base:${{ steps.vars.outputs.TAG }}-arm64
          cache-from: type=gha,scope=rbase-arm64
          cache-to: type=gha,mode=max,scope=rbase-arm64
          provenance: false
          sbom: false

      # 2. Build rstudio
      - name: Build rstudio (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: rstudio
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/rstudio:${{ steps.vars.outputs.TAG }}-arm64
          cache-from: type=gha,scope=rstudio-arm64
          cache-to: type=gha,mode=max,scope=rstudio-arm64
          provenance: false
          sbom: false

      # 3. Build ssh
      - name: Build ssh (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ssh
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/r_remote:${{ steps.vars.outputs.TAG }}-arm64
          cache-from: type=gha,scope=ssh-arm64
          cache-to: type=gha,mode=max,scope=ssh-arm64
          provenance: false
          sbom: false

      # 4. Build codeserver
      - name: Build codeserver (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: codeserver
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/codeserver_r:${{ steps.vars.outputs.TAG }}-arm64
          cache-from: type=gha,scope=codeserver-arm64
          cache-to: type=gha,mode=max,scope=codeserver-arm64
          provenance: false
          sbom: false


# =========================
# merge manifests
# =========================

  merge:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="dev"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create r_base manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/r_base:${{ steps.vars.outputs.TAG }} \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/r_base:${{ steps.vars.outputs.TAG }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/r_base:${{ steps.vars.outputs.TAG }}-arm64

      - name: Create rstudio manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/rstudio:${{ steps.vars.outputs.TAG }} \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/rstudio:${{ steps.vars.outputs.TAG }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/rstudio:${{ steps.vars.outputs.TAG }}-arm64

      - name: Create ssh manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/r_remote:${{ steps.vars.outputs.TAG }} \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/r_remote:${{ steps.vars.outputs.TAG }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/r_remote:${{ steps.vars.outputs.TAG }}-arm64

      - name: Create codeserver manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/codeserver_r:${{ steps.vars.outputs.TAG }} \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/codeserver_r:${{ steps.vars.outputs.TAG }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/codeserver_r:${{ steps.vars.outputs.TAG }}-arm64
