name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Release tag (e.g. 4.5.1_2026Feb)"
        required: true
  push:
    branches:
      - 'devel/*'
      - 'feature/**'
      - 'fix/**'
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="dev"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      # -----------------------------
      # rstudio image
      # -----------------------------
      - name: Build rstudio
        uses: docker/build-push-action@v5
        with:
          context: .
          target: rstudio
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/rstudio:${{ steps.vars.outputs.TAG }}-${{ matrix.arch }}
          cache-from: type=gha,scope=rstudio-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=rstudio-${{ matrix.arch }}
          provenance: false
          sbom: false

      # -----------------------------
      # ssh image
      # -----------------------------
      - name: Build ssh
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ssh
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/r_remote:${{ steps.vars.outputs.TAG }}-${{ matrix.arch }}
          cache-from: type=gha,scope=ssh-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ssh-${{ matrix.arch }}
          provenance: false
          sbom: false


  merge:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="dev"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create rstudio manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/rstudio:${{ steps.vars.outputs.TAG }} \
            ghcr.io/${{ github.repository_owner }}/rstudio:${{ steps.vars.outputs.TAG }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/rstudio:${{ steps.vars.outputs.TAG }}-arm64

      - name: Create ssh manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/r_remote:${{ steps.vars.outputs.TAG }} \
            ghcr.io/${{ github.repository_owner }}/r_remote:${{ steps.vars.outputs.TAG }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/r_remote:${{ steps.vars.outputs.TAG }}-arm64
